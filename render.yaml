services:
  - type: web
    name: ai-doc-analyser-api
    runtime: python
    rootDir: docuagent-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: SHOW_TRACEBACK
        value: false
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
      - key: JWT_EXPIRE_SECONDS
        value: 86400
      - key: OPENAI_TRUST_ENV
        value: true
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: API_TOKEN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: TEAMS_WEBHOOK_URL
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TURNSTILE_SECRET_KEY
        sync: false
